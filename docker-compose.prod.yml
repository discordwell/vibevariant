services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vibariant
      POSTGRES_USER: vibariant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibariant"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "127.0.0.1:8200:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vibariant:${POSTGRES_PASSWORD}@db:5432/vibariant
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      CORS_ORIGINS: '["https://vibariant.com"]'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: https://api.vibariant.com
    ports:
      - "127.0.0.1:3200:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
